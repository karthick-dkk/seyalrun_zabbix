name: docker-publish

# Builds and publishes every service image to Docker Hub. Runs only on a
# version tag push (e.g. v2.0.0) — deliberate releases, not every commit.
#
# Requires two repo secrets (Settings -> Secrets and variables -> Actions),
# set by a human in GitHub's UI — this workflow never receives them any
# other way and nothing in the repo ever holds real Docker Hub credentials:
#   DOCKERHUB_USERNAME  — Docker Hub username (karthickdk02)
#   DOCKERHUB_TOKEN     — Docker Hub access token (Account Settings ->
#                          Security -> New Access Token; NOT your password)

on:
  push:
    tags:
      - "v*"

env:
  DOCKERHUB_NAMESPACE: karthickdk02

jobs:
  build-and-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - automation-service
          - edge-proxy
          - frontend
          - identity-service
          - inventory-service
          - metrics-service
          - recording-service
          - terminal-service
          - zabbix-integration-service
    steps:
      - uses: actions/checkout@v7

      - name: Resolve version tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          # frontend is amd64-only: its build runs a Vite/esbuild compile inside
          # the image, and esbuild's native binary hits an illegal instruction
          # under QEMU's arm64 emulation (SIGILL, "uncaught target signal 4").
          # It's a static nginx-served bundle, not arch-sensitive at runtime.
          platforms: ${{ matrix.service == 'frontend' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/seyalrun-${{ matrix.service }}:${{ steps.ver.outputs.version }}
            ${{ env.DOCKERHUB_NAMESPACE }}/seyalrun-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
