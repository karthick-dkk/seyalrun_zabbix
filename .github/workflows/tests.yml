name: tests

on:
  push:
  pull_request:

jobs:
  security-invariants:
    name: Security invariant suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test deps
        run: pip install -r tests/requirements-test.txt
      - name: Run pytest
        run: pytest -q
