name: security-scan

on:
  push:
  pull_request:
  schedule:
    - cron: "27 4 * * 1"   # weekly, catches newly-disclosed CVEs in pinned deps

jobs:
  trivy-fs:
    name: Trivy filesystem + config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy vulnerability + misconfig scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          # Fail the build on fixable HIGH/CRITICAL in dependencies or Dockerfiles.
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          scanners: vuln,misconfig,secret

  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
