# SeyalRun frontend — static SPA served behind edge-proxy.
# Listens on 8080 (nginx-unprivileged default; edge-proxy proxies to frontend:8080).

# Compress text assets — the JS/CSS bundles are ~600KB raw, ~180KB gzipped.
gzip              on;
gzip_vary         on;
gzip_min_length   1024;
gzip_comp_level   6;
gzip_proxied      any;
gzip_types        text/plain text/css application/javascript application/json
                  application/xml image/svg+xml application/wasm;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }

    # Vite emits content-hashed filenames under /assets — safe to cache forever.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # index.html must never be cached, or clients pin to stale bundle hashes.
        add_header Cache-Control "no-cache, must-revalidate";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
