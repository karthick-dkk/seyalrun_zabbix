<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeyalRun — DevOps Console</title>
    <!-- Paints the app's dark background on the very first frame, before the bundled
         stylesheet or Vue itself has loaded — without this, every fresh load (including
         the Zabbix-embedded iframe, which gets a brand-new document on every navigation)
         briefly shows the browser's default white background first. Kept in sync with
         --bg in src/assets/style.css. -->
    <style>html, body { background: #0a0e1a; }</style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
